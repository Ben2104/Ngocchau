name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_pMEes6MqbGDgpbwfiZJuiA_AweZeoQS
      NEXT_PUBLIC_APP_NAME: Gold Shop System
      NEXT_PUBLIC_DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

  backend-runtime-smoke:
    needs: quality-gates
    runs-on: ubuntu-latest
    env:
      PORT: 4010
      NODE_ENV: production
      APP_NAME: Gold Shop System API
      APP_TIMEZONE: Asia/Ho_Chi_Minh
      APP_ALLOWED_ORIGINS: https://ngocchau.vercel.app
      APP_SWAGGER_ENABLED: "false"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4010/api/v1
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_pMEes6MqbGDgpbwfiZJuiA_AweZeoQS
      NEXT_PUBLIC_APP_NAME: Gold Shop System
      NEXT_PUBLIC_DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
      SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWT_ISSUER: ${{ secrets.CI_SUPABASE_JWT_ISSUER }}
      SUPABASE_JWT_AUDIENCE: ${{ secrets.CI_SUPABASE_JWT_AUDIENCE }}
      SUPABASE_JWKS_URL: ${{ secrets.CI_SUPABASE_JWKS_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate backend smoke secrets
        shell: bash
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_ANON_KEY"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$SUPABASE_JWT_ISSUER"
          test -n "$SUPABASE_JWT_AUDIENCE"
          test -n "$SUPABASE_JWKS_URL"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Smoke test compiled backend
        shell: bash
        run: |
          set -euo pipefail

          node apps/api/dist/main.js > api-runtime.log 2>&1 &
          api_pid=$!

          cleanup() {
            if kill -0 "$api_pid" >/dev/null 2>&1; then
              kill "$api_pid"
              wait "$api_pid" || true
            fi
          }

          trap cleanup EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error "http://127.0.0.1:${PORT}/api/v1/auth/status" > api-health.json; then
              echo "Backend healthcheck passed on attempt ${attempt}."
              cat api-health.json
              exit 0
            fi

            if ! kill -0 "$api_pid" >/dev/null 2>&1; then
              echo "Backend process exited before becoming healthy."
              cat api-runtime.log
              exit 1
            fi

            sleep 2
          done

          echo "Timed out waiting for backend healthcheck."
          cat api-runtime.log
          exit 1
